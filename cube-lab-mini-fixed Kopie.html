<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cube Lab</title>
  <style>
    :root{
      --border:#e7e7e7;
      --border2:#d9d9d9;
      --bg:#ffffff;
      --panel:#ffffff;
      --text:#1f1f1f;
      --muted:#666;
      --good:#1b8f3a;
      --bad:#c62828;
      --warn:#b26a00;
    }
    body{
      font-family: system-ui, -apple-system, Arial;
      margin: 6px;
      color: var(--text);
      background: var(--bg);
    }
    h1{
      margin: 0 0 14px 0;
      font-size: 18px;
      letter-spacing: 0.2px;
    }
    .row{
      display:flex;
      gap: 8px;
      flex-wrap:wrap;
      align-items:flex-start;
      justify-content:center;
    }
    .card{
      border:1px solid var(--border);
      border-radius: 10px;
      padding: 6px;
      background: var(--panel);
      box-shadow: 0 1px 0 rgba(0,0,0,0.03);
    }
    .card h2{
      margin: 0 0 10px 0;
      font-size: 11px;
    }
    canvas{
      border:1px solid var(--border2);
      border-radius: 10px;
      background:#fff;
    }
    .btnrow{
      margin-top:10px;
      display:flex;
      gap: 8px;
      flex-wrap:wrap;
      align-items:center;
    }
    button{
      padding: 4px 8px;
      border-radius: 10px;
      border:1px solid var(--border2);
      background:#fff;
      cursor:pointer;
      font-size: 14px;
      font-weight: 650;
    }
    button.primary{
      border-color:#bdbdbd;
      background:#fafafa;
    }
    button:active{ transform: translateY(1px); }
    label{ font-size: 13px; color: var(--muted); font-weight: 600; }
    input[type="range"]{ width: 110px; }
    .status{
      margin-top:10px;
      padding: 6px 12px;
      border:1px solid var(--border);
      border-radius: 10px;
      background:#fcfcfc;
      font-size: 11px;
      line-height: 1.25;
      min-height: 22px;
    }
    .status .ok{ color: var(--good); font-weight: 800; }
    .status .bad{ color: var(--bad); font-weight: 800; }
    .status .warn{ color: var(--warn); font-weight: 800; }
    .mono{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 11px;
      color:#777;
      margin-top:8px;
      display:none; /* hidden to keep kid-friendly */
    }
  </style>
</head>
<body>
  <h1>Cube Lab</h1>

  <div class="row">
    <div class="card">
      <h2>Netz bauen</h2>
      <canvas id="board2d" width="300" height="300"></canvas>

      <div class="btnrow">
        <button id="modePlace" class="primary">Setzen</button>
        <button id="modeErase">Löschen</button>
        <button id="clear">Alles löschen</button>
        <button id="analyze" class="primary">Analysieren</button>
      </div>

      <div id="out" class="status">Baue ein Netz und klicke <b>Analysieren</b>.</div>
      <div id="debug2d" class="mono"></div>
    </div>

    <div class="card">
      <h2>3D-Falten</h2>
      <canvas id="board3d" width="300" height="300"></canvas>

      <div class="btnrow">
        <button id="resetView">Ansicht zurücksetzen</button>
        <label>Faltwinkel:
          <input id="angle" type="range" min="0" max="90" value="0" />
          <span id="angleLabel">0°</span>
        </label>
      </div>

      <div id="debug3d" class="mono"></div>
    </div>
  </div>

<script>
(() => {
  const key = (x,y) => `${x},${y}`;
  const parseKey = k => k.split(',').map(Number);

  // ---------- 2D ----------
  const canvas2d = document.getElementById('board2d');
  const ctx2d = canvas2d.getContext('2d');
  const out = document.getElementById('out');
  const dbg2d = document.getElementById('debug2d');

  const N = 13, cell = 40;
  const filled = new Set();
  let bad = new Set();
  let mode = 'place';

  function draw2d() {
    ctx2d.clearRect(0,0,canvas2d.width,canvas2d.height);

    ctx2d.beginPath();
    for (let i=0;i<=N;i++){
      ctx2d.moveTo(i*cell, 0); ctx2d.lineTo(i*cell, N*cell);
      ctx2d.moveTo(0, i*cell); ctx2d.lineTo(N*cell, i*cell);
    }
    ctx2d.strokeStyle = '#ededed';
    ctx2d.stroke();

    for (const k of filled) {
      const [x,y] = parseKey(k);
      ctx2d.fillStyle = bad.has(k) ? 'rgba(255,0,0,0.30)' : 'rgba(0,0,0,0.10)';
      ctx2d.fillRect(x*cell+1, y*cell+1, cell-2, cell-2);
      ctx2d.strokeStyle = bad.has(k) ? 'rgba(150,0,0,0.95)' : '#9b9b9b';
      ctx2d.strokeRect(x*cell+1, y*cell+1, cell-2, cell-2);
    }

    dbg2d.textContent = `Modus: ${mode} | Felder: ${filled.size}`;
  }

  function cellAt(px,py){
    const x = Math.floor(px/cell);
    const y = Math.floor(py/cell);
    if (x<0||y<0||x>=N||y>=N) return null;
    return {x,y};
  }

  function neighbors(x,y){
    return [[x+1,y,'R'],[x-1,y,'L'],[x,y-1,'U'],[x,y+1,'D']]
      .filter(([a,b]) => a>=0&&b>=0&&a<N&&b<N);
  }

  function isConnected() {
    const arr = [...filled];
    if (arr.length === 0) return true;
    const start = arr[0];
    const q = [start];
    const seen = new Set([start]);
    while (q.length) {
      const k = q.pop();
      const [x,y] = parseKey(k);
      for (const [nx,ny] of neighbors(x,y)) {
        const nk = key(nx,ny);
        if (filled.has(nk) && !seen.has(nk)) { seen.add(nk); q.push(nk); }
      }
    }
    return seen.size === filled.size;
  }

  // ---------- Foldability (orientation graph) ----------
  const V = { Xp:[1,0,0], Xm:[-1,0,0], Yp:[0,1,0], Ym:[0,-1,0], Zp:[0,0,1], Zm:[0,0,-1] };
  const vecEq = (a,b)=>a[0]===b[0]&&a[1]===b[1]&&a[2]===b[2];
  const vecKey = v => `${v[0]},${v[1]},${v[2]}`;

  function rotAcross(ori, dir){
    const {n,u,v} = ori;
    if (dir==='R') return { n:u, u:[-n[0],-n[1],-n[2]], v:v };
    if (dir==='L') return { n:[-u[0],-u[1],-u[2]], u:n, v:v };
    if (dir==='U') return { n:v, u:u, v:[-n[0],-n[1],-n[2]] };
    if (dir==='D') return { n:[-v[0],-v[1],-v[2]], u:u, v:n };
  }

  function analyzeNet() {
    const conflicts = new Set();
    if (filled.size === 0) return { okConnected:true, okCount:false, okFold:false, conflicts };

    if (!isConnected()) {
      for (const k of filled) conflicts.add(k);
      return { okConnected:false, okCount:false, okFold:false, conflicts };
    }

    const start = [...filled][0];
    const oriMap = new Map();
    const parent = new Map();
    const dirFromParent = new Map();
    oriMap.set(start, {n: V.Zp, u: V.Xp, v: V.Yp});
    parent.set(start, null);

    const faceUsedBy = new Map();
    const q = [start];
    let conflict = false;

    while (q.length) {
      const ck = q.shift();
      const ori = oriMap.get(ck);
      const nK = vecKey(ori.n);

      if (faceUsedBy.has(nK) && faceUsedBy.get(nK) !== ck) {
        conflict = true;
        conflicts.add(ck);
        conflicts.add(faceUsedBy.get(nK));
      } else {
        faceUsedBy.set(nK, ck);
      }

      const [x,y] = parseKey(ck);
      const dirs = [['R',x+1,y],['L',x-1,y],['U',x,y-1],['D',x,y+1]];
      for (const [d,nx,ny] of dirs) {
        const nk = key(nx,ny);
        if (!filled.has(nk)) continue;
        const nextOri = rotAcross(ori, d);

        if (!oriMap.has(nk)) {
          oriMap.set(nk, nextOri);
          parent.set(nk, ck);
          dirFromParent.set(nk, d);
          q.push(nk);
        } else {
          const ex = oriMap.get(nk);
          if (!vecEq(ex.n,nextOri.n) || !vecEq(ex.u,nextOri.u) || !vecEq(ex.v,nextOri.v)) {
            conflict = true;
            conflicts.add(nk);
            conflicts.add(ck);
          }
        }
      }
    }

    const okCount = (filled.size === 6);
    const okFold = okCount && !conflict && faceUsedBy.size === 6;
    return { okConnected:true, okCount, okFold, conflicts, startKey:start, parent, dirFromParent };
  }

  // ---------- 3D (always centered) ----------
  const canvas3d = document.getElementById('board3d');
  const ctx3d = canvas3d.getContext('2d');
  const dbg3d = document.getElementById('debug3d');
  const angleSlider = document.getElementById('angle');
  const angleLabel = document.getElementById('angleLabel');

  let yaw = -0.85, pitch = 0.65;
  let zoom = 165;
  let panX = 0, panY = 0;

  let dragging = false;
  let lastX = 0, lastY = 0;

  function clamp(v,a,b){ return Math.max(a, Math.min(b,v)); }

  const add = (a,b)=>[a[0]+b[0],a[1]+b[1],a[2]+b[2]];
  const sub = (a,b)=>[a[0]-b[0],a[1]-b[1],a[2]-b[2]];
  const mul = (a,s)=>[a[0]*s,a[1]*s,a[2]*s];
  const dot = (a,b)=>a[0]*b[0]+a[1]*b[1]+a[2]*b[2];
  const cross = (a,b)=>[a[1]*b[2]-a[2]*b[1], a[2]*b[0]-a[0]*b[2], a[0]*b[1]-a[1]*b[0]];
  const norm = (a)=>Math.sqrt(dot(a,a));
  const unit = (a)=>{ const n=norm(a)||1; return [a[0]/n,a[1]/n,a[2]/n]; };

  function rotAxis(p, axis, angle){
    const k = unit(axis);
    const cos = Math.cos(angle), sin = Math.sin(angle);
    const term1 = mul(p, cos);
    const term2 = mul(cross(k,p), sin);
    const term3 = mul(k, dot(k,p)*(1-cos));
    return add(add(term1, term2), term3);
  }

  function rotYawPitch(p){
    const cy = Math.cos(yaw), sy = Math.sin(yaw);
    const cx = Math.cos(pitch), sx = Math.sin(pitch);
    let x = p[0]*cy + p[2]*sy;
    let z = -p[0]*sy + p[2]*cy;
    let y = p[1];
    let y2 = y*cx - z*sx;
    let z2 = y*sx + z*cx;
    return [x,y2,z2];
  }

  function project(p){
    const q = rotYawPitch(p);
    const z = q[2] + 4.0;
    const s = zoom / z;
    return [
      canvas3d.width/2 + q[0]*s + panX,
      canvas3d.height/2 - q[1]*s + panY,
      z
    ];
  }

  function computeFacePolys(netInfo, foldDeg){
    const fold = foldDeg * Math.PI/180;
    const polys = [];
    if (filled.size === 0) return polys;

    const start = netInfo.startKey ?? [...filled][0];

    const size = 1.15;
    const half = size/2;
    const local = [[-half,-half,0],[half,-half,0],[half,half,0],[-half,half,0]];

    const frame = new Map();
    frame.set(start, {O:[0,0,0], ex:[1,0,0], ey:[0,1,0], ez:[0,0,1]});

    const children = new Map();
    for (const k of filled) children.set(k, []);
    if (netInfo.parent) {
      for (const [child, par] of netInfo.parent.entries()) {
        if (par && children.has(par)) children.get(par).push(child);
      }
    }

    const q2 = [start];
    const seen2 = new Set([start]);
    while (q2.length) {
      const ck = q2.shift();
      const [x,y] = parseKey(ck);
      for (const [nx,ny,dir] of neighbors(x,y)) {
        const nk = key(nx,ny);
        if (!filled.has(nk) || seen2.has(nk)) continue;
        seen2.add(nk);
        q2.push(nk);
        if (!netInfo.parent || !netInfo.parent.has(nk)) {
          if (!netInfo.parent) netInfo.parent = new Map();
          if (!netInfo.dirFromParent) netInfo.dirFromParent = new Map();
          netInfo.parent.set(nk, ck);
          netInfo.dirFromParent.set(nk, dir);
          if (!children.has(ck)) children.set(ck, []);
          children.get(ck).push(nk);
        }
      }
    }

    function applyChild(parKey, childKey){
      const parF = frame.get(parKey);
      const dir = netInfo.dirFromParent.get(childKey);

      let axisDir, axisPoint, childOffset, angleSign;
      if (dir==='R') {
        axisDir = parF.ey;
        axisPoint = add(parF.O, mul(parF.ex, +half));
        childOffset = mul(parF.ex, +size);
        angleSign = +1;
      } else if (dir==='L') {
        axisDir = parF.ey;
        axisPoint = add(parF.O, mul(parF.ex, -half));
        childOffset = mul(parF.ex, -size);
        angleSign = -1;
      } else if (dir==='U') {
        axisDir = parF.ex;
        axisPoint = add(parF.O, mul(parF.ey, +half));
        childOffset = mul(parF.ey, +size);
        angleSign = -1;
      } else {
        axisDir = parF.ex;
        axisPoint = add(parF.O, mul(parF.ey, -half));
        childOffset = mul(parF.ey, -size);
        angleSign = +1;
      }

      const O0 = add(parF.O, childOffset);
      const ex0 = parF.ex.slice(), ey0 = parF.ey.slice(), ez0 = parF.ez.slice();
      const ang = fold * angleSign;

      function rotPoint(P){
        const rel = sub(P, axisPoint);
        return add(axisPoint, rotAxis(rel, axisDir, ang));
      }
      function rotVec(v){ return rotAxis(v, axisDir, ang); }

      frame.set(childKey, { O: rotPoint(O0), ex: rotVec(ex0), ey: rotVec(ey0), ez: rotVec(ez0) });
    }

    const stack = [start];
    const seen = new Set([start]);
    while (stack.length) {
      const p = stack.pop();
      for (const c of (children.get(p) || [])) {
        if (seen.has(c)) continue;
        seen.add(c);
        applyChild(p,c);
        stack.push(c);
      }
    }

    for (const k of filled) {
      const f = frame.get(k);
      if (!f) continue;
      const corners = local.map(pt => add(add(f.O, mul(f.ex, pt[0])), add(mul(f.ey, pt[1]), mul(f.ez, pt[2]))));
      const proj = corners.map(p => project(p));
      const depth = (proj[0][2]+proj[1][2]+proj[2][2]+proj[3][2])/4;
      polys.push({ key:k, proj, depth });
    }
    return polys.sort((a,b)=>b.depth-a.depth);
  }

  function bbox(polys){
    let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
    for (const poly of polys) for (const p of poly.proj) {
      minX=Math.min(minX,p[0]); minY=Math.min(minY,p[1]);
      maxX=Math.max(maxX,p[0]); maxY=Math.max(maxY,p[1]);
    }
    if (!isFinite(minX)) return null;
    return {minX, minY, maxX, maxY, w:maxX-minX, h:maxY-minY, cx:(minX+maxX)/2, cy:(minY+maxY)/2};
  }

  function autoCenterAndFit(netInfo, foldDeg){
    const margin = 44;
    panX = 0; panY = 0;

    let polys = computeFacePolys(netInfo, foldDeg);
    let bb = bbox(polys);
    if (!bb || bb.w < 1 || bb.h < 1) return;

    const targetW = canvas3d.width - 2*margin;
    const targetH = canvas3d.height - 2*margin;
    const factor = Math.min(targetW/bb.w, targetH/bb.h);

    const desired = clamp(zoom*factor, 120, 300);
    zoom = zoom*0.75 + desired*0.25;

    polys = computeFacePolys(netInfo, foldDeg);
    bb = bbox(polys);
    if (!bb) return;
    panX = (canvas3d.width/2) - bb.cx;
    panY = (canvas3d.height/2) - bb.cy;
  }

  function draw3d(netInfo, foldDeg){
    autoCenterAndFit(netInfo, foldDeg);

    ctx3d.clearRect(0,0,canvas3d.width,canvas3d.height);

    ctx3d.beginPath();
    for (let i=0;i<=13;i++){
      const t = i*(canvas3d.width/13);
      ctx3d.moveTo(t, 0); ctx3d.lineTo(t, canvas3d.height);
      ctx3d.moveTo(0, t); ctx3d.lineTo(canvas3d.width, t);
    }
    ctx3d.strokeStyle = 'rgba(0,0,0,0.03)';
    ctx3d.stroke();

    const polys = computeFacePolys(netInfo, foldDeg);
    for (const poly of polys) {
      const pts = poly.proj;
      ctx3d.beginPath();
      ctx3d.moveTo(pts[0][0], pts[0][1]);
      for (let i=1;i<pts.length;i++) ctx3d.lineTo(pts[i][0], pts[i][1]);
      ctx3d.closePath();

      const isBad = bad.has(poly.key);
      ctx3d.fillStyle = isBad ? 'rgba(255,0,0,0.22)' : 'rgba(0,0,0,0.08)';
      ctx3d.fill();
      ctx3d.lineWidth = 1;
      ctx3d.strokeStyle = isBad ? 'rgba(160,0,0,0.9)' : 'rgba(120,120,120,0.9)';
      ctx3d.stroke();
    }
    dbg3d.textContent = "";
  }

  // ---------- UI wiring ----------
  function applyAtEvent(evt){
    const rect = canvas2d.getBoundingClientRect();
    let cx, cy;
    if (evt.touches && evt.touches[0]) { cx = evt.touches[0].clientX; cy = evt.touches[0].clientY; }
    else { cx = evt.clientX; cy = evt.clientY; }
    const px = cx - rect.left, py = cy - rect.top;
    const p = cellAt(px,py);
    if (!p) return;
    const k = key(p.x,p.y);
    if (mode === 'place') filled.add(k); else filled.delete(k);
    bad = new Set();
    out.innerHTML = "Änderung gespeichert. Jetzt <b>Analysieren</b>.";
    draw2d();
    redraw3d();
  }

  canvas2d.addEventListener('mousedown', (e)=>applyAtEvent(e));
  canvas2d.addEventListener('touchstart', (e)=>{ e.preventDefault(); applyAtEvent(e); }, {passive:false});
  canvas2d.addEventListener('pointerdown', (e)=>applyAtEvent(e));

  document.getElementById('modePlace').onclick = ()=>{ mode='place'; draw2d(); };
  document.getElementById('modeErase').onclick = ()=>{ mode='erase'; draw2d(); };
  document.getElementById('clear').onclick = ()=>{
    filled.clear(); bad = new Set();
    out.innerHTML="Baue ein Netz und klicke <b>Analysieren</b>.";
    draw2d(); redraw3d();
  };
  document.getElementById('analyze').onclick = ()=>analyzeAndRender();

  function analyzeAndRender(){
    const info = analyzeNet();
    bad = info.conflicts;

    if (!info.okConnected) {
      out.innerHTML = `❌ <span class="bad">Passt nicht.</span> Die Flächen müssen zusammenhängen.`;
    } else if (!info.okCount) {
      out.innerHTML = `⚠️ <span class="warn">Fast.</span> Du brauchst <b>genau 6</b> Flächen (aktuell: ${filled.size}).`;
    } else if (!info.okFold) {
      out.innerHTML = `❌ <span class="bad">Passt nicht.</span> Beim Falten gäbe es einen Konflikt (rot markiert).`;
    } else {
      out.innerHTML = `✅ <span class="ok">Passt!</span> Das ist ein gültiges Würfelnetz.`;
    }

    draw2d();
    draw3d(info, Number(angleSlider.value));
    lastNetInfo = info;
  }

  let lastNetInfo = analyzeNet();

  function redraw3d(){
    const info = analyzeNet();
    lastNetInfo = info;
    draw3d(info, Number(angleSlider.value));
  }

  angleSlider.addEventListener('input', () => {
    angleLabel.textContent = `${angleSlider.value}°`;
    draw3d(lastNetInfo, Number(angleSlider.value));
  });

  // 3D rotate only
  canvas3d.addEventListener('mousedown', (e)=>{
    dragging = true;
    lastX = e.clientX; lastY = e.clientY;
  });
  window.addEventListener('mousemove', (e)=>{
    if (!dragging) return;
    const dx = e.clientX-lastX, dy = e.clientY-lastY;
    lastX = e.clientX; lastY = e.clientY;
    yaw += dx*0.006;
    pitch += dy*0.006;
    pitch = clamp(pitch, -1.25, 1.25);
    draw3d(lastNetInfo, Number(angleSlider.value));
  });
  window.addEventListener('mouseup', ()=> dragging = false);

  document.getElementById('resetView').onclick = ()=>{
    yaw = -0.85; pitch = 0.65; zoom = 165;
    draw3d(lastNetInfo, Number(angleSlider.value));
  };

  // init
  angleLabel.textContent = `${angleSlider.value}°`;
  draw2d();
  redraw3d();
})();
</script>
</body>
</html>
